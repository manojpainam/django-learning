{% extends "base.html" %}

{% block title %}
    Students - List of all Students
{% endblock %}

{% block content %}
    <h1>Students</h1>

    <ul>
        {% for student in students%}
            <li><a href="/student/{{student.id}}">{{student.fname}} {{student.lname}}</a></li>
        {% endfor %}
    </ul>
{% endblock %}
